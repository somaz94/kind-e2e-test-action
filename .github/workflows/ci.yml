name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: yamllint -d relaxed action.yml .github/workflows/ tests/

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          cache: true

  test-action:
    name: Test Action (defaults)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action with default inputs against fixture
        id: e2e
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator_e2e

      - name: Verify outputs
        run: |
          CLUSTER='${{ steps.e2e.outputs.cluster_name }}'
          EXIT='${{ steps.e2e.outputs.e2e_exit_code }}'
          echo "cluster_name=${CLUSTER}"
          echo "e2e_exit_code=${EXIT}"
          if [[ "${CLUSTER}" != "kind" ]]; then
            echo "::error::expected cluster_name='kind', got '${CLUSTER}'"
            exit 1
          fi
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected e2e_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          echo "[PASS] defaults"

  test-action-custom:
    name: Test Action (custom cluster_name + pinned kind_version + custom e2e_command)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action with custom inputs against fixture
        id: e2e
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator_e2e
          kind_version: v0.23.0
          cluster_name: custom-e2e
          e2e_command: 'go test ./test/e2e/ -v -count=1'

      - name: Verify outputs
        run: |
          CLUSTER='${{ steps.e2e.outputs.cluster_name }}'
          EXIT='${{ steps.e2e.outputs.e2e_exit_code }}'
          echo "cluster_name=${CLUSTER}"
          echo "e2e_exit_code=${EXIT}"
          if [[ "${CLUSTER}" != "custom-e2e" ]]; then
            echo "::error::expected cluster_name='custom-e2e', got '${CLUSTER}'"
            exit 1
          fi
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected e2e_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          echo "[PASS] custom inputs"

  test-action-failure:
    name: Test Action (failure path uploads kind logs artifact)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action with an e2e_command that intentionally fails
        id: e2e
        uses: ./
        continue-on-error: true
        with:
          working_directory: tests/fixtures/sample_operator_e2e
          cluster_name: failure-e2e
          e2e_command: 'false'

      - name: Assert action failed
        run: |
          OUTCOME='${{ steps.e2e.outcome }}'
          echo "outcome=${OUTCOME}"
          if [[ "${OUTCOME}" != "failure" ]]; then
            echo "::error::expected outcome='failure', got '${OUTCOME}'"
            exit 1
          fi
          echo "[PASS] action failed as expected"

      - name: Download kind logs artifact
        uses: actions/download-artifact@v8
        with:
          name: kind-logs-failure-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: downloaded-kind-logs

      - name: Verify artifact contains kind export dump
        run: |
          set -euo pipefail
          ls -laR downloaded-kind-logs
          if [[ ! -d downloaded-kind-logs ]]; then
            echo "::error::download-artifact path missing"
            exit 1
          fi
          # kind export logs writes a per-node subdir named after the control-plane node
          if ! find downloaded-kind-logs -type f -name 'kubelet.log' | grep -q .; then
            echo "::error::expected a 'kubelet.log' file inside the artifact"
            exit 1
          fi
          echo "[PASS] kind logs artifact uploaded and downloadable"

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, test-action, test-action-custom, test-action-failure]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::lint failed"
            exit 1
          fi
          if [[ "${{ needs.test-action.result }}" != "success" ]]; then
            echo "::error::test-action failed"
            exit 1
          fi
          if [[ "${{ needs.test-action-custom.result }}" != "success" ]]; then
            echo "::error::test-action-custom failed"
            exit 1
          fi
          if [[ "${{ needs.test-action-failure.result }}" != "success" ]]; then
            echo "::error::test-action-failure failed"
            exit 1
          fi
          echo "All CI jobs passed"
