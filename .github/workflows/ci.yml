name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: yamllint -d relaxed action.yml .github/workflows/ tests/

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          cache: true

  test-action:
    name: Test Action (defaults)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action with default inputs against fixture
        id: e2e
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator_e2e

      - name: Verify outputs
        run: |
          CLUSTER='${{ steps.e2e.outputs.cluster_name }}'
          EXIT='${{ steps.e2e.outputs.e2e_exit_code }}'
          echo "cluster_name=${CLUSTER}"
          echo "e2e_exit_code=${EXIT}"
          if [[ "${CLUSTER}" != "kind" ]]; then
            echo "::error::expected cluster_name='kind', got '${CLUSTER}'"
            exit 1
          fi
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected e2e_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          echo "[PASS] defaults"

  test-action-custom:
    name: Test Action (custom cluster_name + pinned kind_version + custom e2e_command)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run action with custom inputs against fixture
        id: e2e
        uses: ./
        with:
          working_directory: tests/fixtures/sample_operator_e2e
          kind_version: v0.23.0
          cluster_name: custom-e2e
          e2e_command: 'go test ./test/e2e/ -v -count=1'

      - name: Verify outputs
        run: |
          CLUSTER='${{ steps.e2e.outputs.cluster_name }}'
          EXIT='${{ steps.e2e.outputs.e2e_exit_code }}'
          echo "cluster_name=${CLUSTER}"
          echo "e2e_exit_code=${EXIT}"
          if [[ "${CLUSTER}" != "custom-e2e" ]]; then
            echo "::error::expected cluster_name='custom-e2e', got '${CLUSTER}'"
            exit 1
          fi
          if [[ "${EXIT}" != "0" ]]; then
            echo "::error::expected e2e_exit_code='0', got '${EXIT}'"
            exit 1
          fi
          echo "[PASS] custom inputs"

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, test-action, test-action-custom]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::lint failed"
            exit 1
          fi
          if [[ "${{ needs.test-action.result }}" != "success" ]]; then
            echo "::error::test-action failed"
            exit 1
          fi
          if [[ "${{ needs.test-action-custom.result }}" != "success" ]]; then
            echo "::error::test-action-custom failed"
            exit 1
          fi
          echo "All CI jobs passed"
