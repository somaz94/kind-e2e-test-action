name: Kind E2E Test Action
description: Install kind, create a kind cluster, and run a Go end-to-end test command in one composite action.
author: somaz94

branding:
  icon: box
  color: blue

inputs:
  go_version_file:
    description: "Path to go.mod (or another file) used by actions/setup-go as 'go-version-file'. Ignored when 'go_version' is set."
    required: false
    default: 'go.mod'
  go_version:
    description: "Explicit Go version (e.g., '1.22'). Takes precedence over 'go_version_file' when non-empty."
    required: false
    default: ''
  working_directory:
    description: "Directory to run all commands in (Go module root)."
    required: false
    default: '.'
  cache:
    description: "Enable Go module/build cache in actions/setup-go."
    required: false
    default: 'true'
  cache_dependency_path:
    description: "Passthrough to actions/setup-go 'cache-dependency-path'. Leave empty to rely on setup-go's default (go.sum next to go.mod). Handy for mono-repos where go.sum lives elsewhere."
    required: false
    default: ''
  run_mod_tidy:
    description: "When 'true', run 'go mod tidy' before the e2e command. Matches the existing inline workflow behaviour."
    required: false
    default: 'true'
  kind_version:
    description: "kind release to install. Use 'latest' (default) or a version tag like 'v0.23.0'."
    required: false
    default: 'latest'
  kind_node_image:
    description: "Node image passed to 'kind create cluster --image'. Leave empty to use kind's default for the installed release. Ignored for nodes that set an image inside 'kind_config'."
    required: false
    default: ''
  kind_config:
    description: "Path to a kind cluster config YAML passed as 'kind create cluster --config'. Leave empty for a single-node default cluster."
    required: false
    default: ''
  cluster_name:
    description: "Name passed to 'kind create cluster --name'."
    required: false
    default: 'kind'
  cluster_ready_timeout:
    description: "Timeout passed to 'kubectl wait --for=condition=Ready nodes --all --timeout=<value>' after cluster creation. Leave empty to skip the wait."
    required: false
    default: '60s'
  e2e_command:
    description: "E2E command executed from 'working_directory' (e.g., 'make test-e2e', 'go test ./test/e2e/ -v')."
    required: false
    default: 'make test-e2e'
  upload_logs_on_failure:
    description: "When 'true' (default), on action failure run 'kind export logs' and upload the directory as a workflow artifact named 'kind-logs-<cluster_name>-<run_id>-<run_attempt>'."
    required: false
    default: 'true'

outputs:
  cluster_name:
    description: "Name of the kind cluster that was created (echo of the 'cluster_name' input)."
    value: ${{ steps.cluster.outputs.cluster_name }}
  e2e_exit_code:
    description: "Exit code of the e2e command (always '0' when the action succeeds; the action fails otherwise)."
    value: ${{ steps.e2e.outputs.e2e_exit_code }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        GO_VERSION: ${{ inputs.go_version }}
        GO_VERSION_FILE: ${{ inputs.go_version_file }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
        KIND_VERSION: ${{ inputs.kind_version }}
        KIND_CONFIG: ${{ inputs.kind_config }}
        CLUSTER_NAME: ${{ inputs.cluster_name }}
        CLUSTER_READY_TIMEOUT: ${{ inputs.cluster_ready_timeout }}
        E2E_COMMAND: ${{ inputs.e2e_command }}
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        if [[ -z "${GO_VERSION// }" && -z "${GO_VERSION_FILE// }" ]]; then
          echo "::error::either 'go_version' or 'go_version_file' must be set"
          exit 1
        fi

        if [[ ! -d "$WORKING_DIRECTORY" ]]; then
          echo "::error::working_directory '$WORKING_DIRECTORY' is not a directory"
          exit 1
        fi

        if [[ -z "${CLUSTER_NAME// }" ]]; then
          echo "::error::'cluster_name' must not be empty"
          exit 1
        fi

        if [[ -z "${E2E_COMMAND// }" ]]; then
          echo "::error::'e2e_command' must not be empty"
          exit 1
        fi

        if [[ -n "${KIND_CONFIG// }" && ! -f "$KIND_CONFIG" ]]; then
          echo "::error::kind_config '$KIND_CONFIG' not found"
          exit 1
        fi

        if [[ -n "${GO_VERSION// }" ]]; then
          echo "go_version=$GO_VERSION (explicit)"
        else
          echo "go_version_file=$GO_VERSION_FILE"
          if [[ ! -f "$WORKING_DIRECTORY/$GO_VERSION_FILE" ]]; then
            echo "::warning::go_version_file '$WORKING_DIRECTORY/$GO_VERSION_FILE' not found; actions/setup-go may fail"
          fi
        fi
        echo "kind_version=$KIND_VERSION"
        echo "kind_config=${KIND_CONFIG:-<none>}"
        echo "cluster_name=$CLUSTER_NAME"
        echo "cluster_ready_timeout=${CLUSTER_READY_TIMEOUT:-<skip>}"
        echo "e2e_command=$E2E_COMMAND"
        echo "::endgroup::"

    - name: Set up Go (from file)
      if: inputs.go_version == ''
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.working_directory == '.' && inputs.go_version_file || format('{0}/{1}', inputs.working_directory, inputs.go_version_file) }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache_dependency_path }}

    - name: Set up Go (explicit)
      if: inputs.go_version != ''
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go_version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache_dependency_path }}

    - name: Install kind
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kind_version }}
      run: |
        set -euo pipefail
        echo "::group::Install kind ($KIND_VERSION)"

        case "$(uname -s)" in
          Linux)  OS=linux ;;
          Darwin) OS=darwin ;;
          *)
            echo "::error::unsupported OS '$(uname -s)'; kind-e2e-test-action supports Linux and macOS runners"
            exit 1
            ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64)  ARCH=amd64 ;;
          aarch64|arm64) ARCH=arm64 ;;
          *)
            echo "::error::unsupported architecture '$(uname -m)'"
            exit 1
            ;;
        esac

        if [[ "$KIND_VERSION" == "latest" ]]; then
          URL="https://kind.sigs.k8s.io/dl/latest/kind-${OS}-${ARCH}"
        else
          URL="https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-${OS}-${ARCH}"
        fi

        echo "Downloading $URL"
        curl -fsSLo ./kind "$URL"
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        echo "::endgroup::"

    - name: Verify kind installation
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::kind version"
        kind version
        echo "::endgroup::"

    - name: Create kind cluster
      id: cluster
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster_name }}
        NODE_IMAGE: ${{ inputs.kind_node_image }}
        KIND_CONFIG: ${{ inputs.kind_config }}
      run: |
        set -euo pipefail
        echo "::group::kind create cluster ($CLUSTER_NAME)"
        args=(--name "$CLUSTER_NAME")
        if [[ -n "${NODE_IMAGE// }" ]]; then
          args+=(--image "$NODE_IMAGE")
        fi
        if [[ -n "${KIND_CONFIG// }" ]]; then
          args+=(--config "$KIND_CONFIG")
        fi
        kind create cluster "${args[@]}"
        kubectl cluster-info --context "kind-${CLUSTER_NAME}"
        echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Wait for cluster readiness
      if: inputs.cluster_ready_timeout != ''
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster_name }}
        CLUSTER_READY_TIMEOUT: ${{ inputs.cluster_ready_timeout }}
      run: |
        set -euo pipefail
        echo "::group::kubectl wait nodes Ready (timeout=$CLUSTER_READY_TIMEOUT)"
        kubectl --context "kind-${CLUSTER_NAME}" wait --for=condition=Ready nodes --all --timeout="$CLUSTER_READY_TIMEOUT"
        echo "::endgroup::"

    - name: go mod tidy
      if: inputs.run_mod_tidy == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::go mod tidy"
        go mod tidy
        echo "::endgroup::"

    - name: Run e2e
      id: e2e
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        E2E_COMMAND: ${{ inputs.e2e_command }}
      run: |
        set -euo pipefail
        echo "::group::Run e2e: $E2E_COMMAND"
        bash -c "$E2E_COMMAND"
        echo "::endgroup::"
        echo "e2e_exit_code=0" >> "$GITHUB_OUTPUT"

    - name: Export kind logs on failure
      id: export_logs
      if: failure() && inputs.upload_logs_on_failure == 'true'
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster_name }}
      run: |
        set +e
        LOGS_DIR="${RUNNER_TEMP:-/tmp}/kind-logs-${CLUSTER_NAME}"
        rm -rf "$LOGS_DIR"
        mkdir -p "$LOGS_DIR"
        echo "::group::kind export logs ($LOGS_DIR)"
        if ! command -v kind >/dev/null 2>&1; then
          echo "::notice::kind binary not available (failure occurred before install) — skipping log export"
          echo "logs_dir=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if ! kind get clusters 2>/dev/null | grep -qx "$CLUSTER_NAME"; then
          echo "::notice::cluster '$CLUSTER_NAME' not present — skipping log export"
          echo "logs_dir=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        kind export logs "$LOGS_DIR" --name "$CLUSTER_NAME" || echo "::warning::'kind export logs' returned non-zero (logs may be partial)"
        echo "logs_dir=$LOGS_DIR" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Upload kind logs artifact
      if: failure() && inputs.upload_logs_on_failure == 'true' && steps.export_logs.outputs.logs_dir != ''
      uses: actions/upload-artifact@v7
      with:
        name: kind-logs-${{ inputs.cluster_name }}-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ steps.export_logs.outputs.logs_dir }}
        retention-days: 7
        if-no-files-found: warn

    - name: Summary
      shell: bash
      env:
        CLUSTER_NAME: ${{ inputs.cluster_name }}
        KIND_VERSION: ${{ inputs.kind_version }}
        NODE_IMAGE: ${{ inputs.kind_node_image }}
        KIND_CONFIG: ${{ inputs.kind_config }}
        CLUSTER_READY_TIMEOUT: ${{ inputs.cluster_ready_timeout }}
        E2E_COMMAND: ${{ inputs.e2e_command }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
          exit 0
        fi
        {
          echo "### Kind E2E Test"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Working directory | \`${WORKING_DIRECTORY}\` |"
          echo "| kind version | \`${KIND_VERSION}\` |"
          if [[ -n "${NODE_IMAGE// }" ]]; then
            echo "| Node image | \`${NODE_IMAGE}\` |"
          fi
          if [[ -n "${KIND_CONFIG// }" ]]; then
            echo "| Cluster config | \`${KIND_CONFIG}\` |"
          fi
          echo "| Cluster name | \`${CLUSTER_NAME}\` |"
          echo "| Cluster ready timeout | \`${CLUSTER_READY_TIMEOUT:-<skip>}\` |"
          echo "| E2E command | \`${E2E_COMMAND}\` |"
          echo "| Result | :white_check_mark: pass |"
        } >> "$GITHUB_STEP_SUMMARY"
